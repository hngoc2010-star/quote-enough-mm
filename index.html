<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Plywood Quote</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:10px;
font-size:13px;
}

h2{
text-align:center;
font-size:18px;
}

label{
font-size:12px;
}

input{
width:100%;
padding:6px;
margin:4px 0;
font-size:12px;
}

button{
width:100%;
padding:8px;
font-size:13px;
background:#007aff;
color:white;
border:none;
border-radius:6px;
margin-top:6px;
}

.result{
background:white;
padding:10px;
margin-top:10px;
border-radius:8px;
line-height:1.6;
}

</style>

</head>

<body>

<h2>Plywood Quote</h2>

<label>Thickness (mm)</label>
<input id="t">

<label>Bundles</label>
<input id="bundle">

<label>Pcs / Bundle</label>
<input id="pcs">

<label>EXW</label>
<input id="exw">

<label>Logistic</label>
<input id="logistic">

<label>USD Rate</label>
<input id="usd">

<button onclick="calc()">CALCULATE</button>

<div class="result" id="result"></div>

<script>

function f(x){
return x.toLocaleString('en-US')
}

function calc(){

let thickness=parseFloat(t.value)
let bundle=parseFloat(bundle.value)
let pcs=parseFloat(pcs.value)
let exw=parseFloat(exw.value)
let logistic=parseFloat(logistic.value)
let usd=parseFloat(usd.value)

let width=1220
let length=2440

let totalpcs=bundle*pcs

let cbm=(thickness*width*length)/1000000000

let cbmBuying=cbm*totalpcs
let cbmSelling=cbm*totalpcs

let totalEXW=exw*totalpcs

let totalCost=totalEXW+logistic

let sellingPrice=450

let sellingAmount=Math.round(sellingPrice*usd*cbmSelling)

let profit=Math.round(sellingAmount-totalCost)

let color = profit < 0 ? "red" : "black"

result.innerHTML=

"TOTAL PCS: "+f(totalpcs)+"<br><br>"+

"CBM / PCS: "+cbm.toFixed(4)+"<br><br>"+

"CBM CONT. BUYING: "+cbmBuying.toFixed(2)+"<br><br>"+

"CBM CONT. SELLING: "+cbmSelling.toFixed(2)+"<br><br>"+

"TOTAL EXW: "+f(totalEXW)+"<br><br>"+

"TOTAL COST: "+f(totalCost)+"<br><br>"+

"SELLING AMOUNT: "+f(sellingAmount)+"<br><br>"+

"<b style='color:"+color+"'>PROFITS: "+f(profit)+"</b>"

}

</script>

</body>
</html>
