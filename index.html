<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Plywood Quote</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:10px;
font-size:13px;
}

h2{
text-align:center;
font-size:18px;
}

label{
font-size:12px;
}

input{
width:100%;
padding:5px;
margin:3px 0;
font-size:12px;
}

button{
width:100%;
padding:7px;
font-size:13px;
background:#007aff;
color:white;
border:none;
border-radius:6px;
margin-top:6px;
}

.result{
background:white;
padding:10px;
margin-top:10px;
border-radius:8px;
line-height:1.6;
}

</style>

</head>

<body>

<h2>Plywood Quote</h2>

<label>Thickness (mm)</label>
<input id="t">

<label>EXW Price</label>
<input id="exw">

<label>Logistic</label>
<input id="logistic">

<label>USD Rate</label>
<input id="usd">

<button onclick="calc()">CALCULATE</button>

<div class="result" id="result"></div>

<script>

function f(x){
return x.toLocaleString('en-US')
}

function calc(){

let t=parseFloat(t.value)
let exw=parseFloat(exw.value)
let logistic=parseFloat(logistic.value)
let usd=parseFloat(usd.value)

let cbmBuying = 67
let cbmSelling = 67

let price = 450

let totalEXW = exw * cbmBuying

let totalCost = totalEXW + logistic

let sellingAmount = Math.round(price * usd * cbmSelling)

let profit = Math.round(sellingAmount - totalCost)

let color = profit < 0 ? "red" : "black"

result.innerHTML =

"THICKNESS: "+t+" mm<br><br>"+

"CBM CONT. BUYING: "+cbmBuying.toFixed(2)+"<br><br>"+

"CBM CONT. SELLING: "+cbmSelling.toFixed(2)+"<br><br>"+

"TOTAL EXW: "+f(totalEXW)+"<br><br>"+

"TOTAL COST: "+f(totalCost)+"<br><br>"+

"SELLING AMOUNT: "+f(sellingAmount)+"<br><br>"+

"<b style='color:"+color+"'>PROFITS: "+f(profit)+"</b>"

}

</script>

</body>
</html>
